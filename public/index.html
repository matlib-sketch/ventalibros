<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Libros en Venta</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2c1810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Libros">
  <link rel="apple-touch-icon" href="/icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #fdf6ec; color: #2c2c2c; min-height: 100vh; }
    header { background: #2c1810; color: #fdf6ec; padding: 24px 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    header h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 4px; }
    header p { font-size: 0.9rem; color: #c9a87c; letter-spacing: 1px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #3d2314; color: #fdf6ec; font-size: 0.85rem; flex-wrap: wrap; gap: 8px; }
    .top-bar a { color: #c9a87c; text-decoration: none; font-weight: bold; border: 1px solid #c9a87c; padding: 5px 12px; border-radius: 4px; transition: all 0.2s; }
    .top-bar a:hover { background: #c9a87c; color: #2c1810; }
    .filters { padding: 16px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #f5ead8; border-bottom: 1px solid #ddd; }
    .filters input { flex: 1; min-width: 160px; padding: 8px 14px; border: 1px solid #c9a87c; border-radius: 20px; font-size: 0.95rem; background: white; outline: none; }
    .filters input:focus { border-color: #8b4513; }
    #book-count { font-size: 0.85rem; color: #666; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; padding: 28px 20px; max-width: 1200px; margin: 0 auto; }
    .book-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 12px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; position: relative; }
    .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .book-card.sold { opacity: 0.55; }
    .book-card.sold::after { content: "VENDIDO"; position: absolute; top: 12px; right: -28px; background: #c0392b; color: white; font-size: 0.7rem; font-weight: bold; padding: 4px 36px; transform: rotate(35deg); letter-spacing: 1px; }
    .book-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: center top; background: #e8dcc8; display: block; }
    .book-img-placeholder { width: 100%; aspect-ratio: 3/4; background: linear-gradient(135deg, #e8dcc8, #d4c4a8); display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #a08060; }
    .book-info { padding: 14px; }
    .book-title { font-size: 1rem; font-weight: bold; line-height: 1.3; margin-bottom: 4px; color: #2c1810; }
    .book-author { font-size: 0.8rem; color: #888; margin-bottom: 12px; font-style: italic; }
    .book-detail { font-size: 0.78rem; color: #777; margin-bottom: 10px; line-height: 1.4; }
    .price-block { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .price-sale { font-size: 1.4rem; font-weight: bold; color: #2c7a3c; }
    .price-original { font-size: 0.8rem; color: #aaa; text-decoration: line-through; }
    .discount-badge { background: #e74c3c; color: white; font-size: 0.65rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; }
    .btn-cart { display: block; width: 100%; margin-top: 10px; padding: 8px; border: 2px solid #2c7a3c; border-radius: 6px; background: white; color: #2c7a3c; font-size: 0.85rem; font-weight: bold; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-cart:hover { background: #2c7a3c; color: white; }
    .btn-cart.in-cart { background: #2c7a3c; color: white; }
    .admin-btns { display: none; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .admin-btns.visible { display: flex; }
    .btn-sold, .btn-delete, .btn-photo, .btn-edit { flex: 1; min-width: calc(50% - 3px); padding: 6px; border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
    .btn-sold { background: #f39c12; color: white; }
    .btn-sold:hover { opacity: 0.85; }
    .btn-delete { background: #e74c3c; color: white; }
    .btn-delete:hover { opacity: 0.85; }
    .btn-photo { background: #3498db; color: white; }
    .btn-photo:hover { opacity: 0.85; }
    .btn-edit { background: #27ae60; color: white; }
    .btn-edit:hover { opacity: 0.85; }
    #cart-float { position: fixed; bottom: 24px; right: 24px; background: #2c1810; color: white; border: none; border-radius: 50px; padding: 14px 20px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3); z-index: 900; display: none; align-items: center; gap: 8px; transition: transform 0.2s; font-family: inherit; }
    #cart-float:hover { transform: scale(1.05); }
    #cart-badge { background: #e74c3c; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; }
    #cart-modal, #edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
    #cart-modal .modal-box { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
    #edit-modal .modal-box { background: white; border-radius: 12px; padding: 24px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    #cart-modal h3, #edit-modal h3 { margin-bottom: 16px; color: #2c1810; font-size: 1.1rem; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; gap: 10px; }
    .cart-item-title { font-size: 0.9rem; font-weight: bold; color: #2c1810; flex: 1; }
    .cart-item-author { font-size: 0.78rem; color: #888; }
    .cart-item-price { font-size: 0.95rem; font-weight: bold; color: #2c7a3c; white-space: nowrap; }
    .cart-item-remove { background: none; border: none; cursor: pointer; color: #e74c3c; font-size: 1rem; padding: 0 4px; }
    .cart-total { display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; margin-top: 16px; padding-top: 12px; border-top: 2px solid #2c1810; color: #2c1810; }
    .cart-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .btn-whatsapp { padding: 12px; background: #25d366; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; font-family: inherit; }
    .btn-whatsapp:hover { opacity: 0.9; }
    .btn-email { padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; font-family: inherit; }
    .btn-email:hover { opacity: 0.9; }
    .btn-cart-cancel { padding: 10px; background: #eee; color: #555; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; font-family: inherit; }
    .btn-cart-cancel:hover { background: #ddd; }
    #edit-modal label { display: block; margin-bottom: 12px; }
    #edit-modal .field-label { font-size: 0.78rem; color: #666; font-weight: bold; display: block; margin-bottom: 4px; }
    #edit-modal input, #edit-modal textarea { display: block; width: 100%; padding: 8px 12px; border: 1px solid #c9a87c; border-radius: 6px; font-size: 0.95rem; font-family: inherit; outline: none; }
    #edit-modal input:focus, #edit-modal textarea:focus { border-color: #8b4513; }
    #edit-modal textarea { resize: vertical; min-height: 80px; }
    #edit-modal .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    #edit-modal .btn-save { flex: 1; padding: 10px; background: #2c7a3c; color: white; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; }
    #edit-modal .btn-save:hover { opacity: 0.85; }
    #edit-modal .btn-cancel { flex: 1; padding: 10px; background: #eee; color: #555; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; }
    #edit-modal .btn-cancel:hover { background: #ddd; }
    .empty-state { text-align: center; padding: 80px 20px; color: #999; grid-column: 1 / -1; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1.1rem; }
    .admin-bar { background: #fff3cd; border: 1px solid #ffc107; padding: 10px 20px; text-align: center; font-size: 0.85rem; color: #856404; }
    .admin-bar button { margin-left: 10px; padding: 4px 12px; border: 1px solid #856404; background: transparent; border-radius: 4px; cursor: pointer; color: #856404; font-weight: bold; }
    @media (max-width: 480px) {
      header h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px 10px; }
      .book-info { padding: 10px; }
      .book-title { font-size: 0.85rem; }
      .price-sale { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Mis Libros</h1>
  <p>Libros usados en excelente estado</p>
</header>

<div class="top-bar">
  <span id="book-count">Cargando...</span>
  <a href="/admin.html">+ Agregar libro</a>
</div>

<div id="admin-bar" class="admin-bar" style="display:none">
  Modo administrador activo — puedes marcar libros como vendidos o eliminarlos
  <button onclick="toggleAdmin()">Salir</button>
</div>

<div class="filters">
  <input type="text" id="search" placeholder="Buscar por titulo o autor..." oninput="renderBooks()">
</div>

<div class="grid" id="grid"></div>

<button id="cart-float" onclick="openCart()">
  🛒 Ver selección
  <span id="cart-badge">0</span>
</button>

<div id="cart-modal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>📦 Tu selección</h3>
    <div id="cart-items"></div>
    <div class="cart-total">
      <span>Total estimado</span>
      <span id="cart-total-price"></span>
    </div>
    <div class="cart-actions">
      <button class="btn-whatsapp" onclick="sendWhatsApp()">💬 Enviar por WhatsApp</button>
      <button class="btn-email" onclick="sendEmail()">✉️ Enviar por Email</button>
      <button class="btn-cart-cancel" onclick="closeCart()">Cerrar</button>
    </div>
  </div>
</div>

<div id="edit-modal">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Editar libro</h3>
    <label>
      <span class="field-label">TÍTULO</span>
      <input id="edit-title" type="text" placeholder="Título del libro">
    </label>
    <label>
      <span class="field-label">AUTOR</span>
      <input id="edit-author" type="text" placeholder="Autor">
    </label>
    <label>
      <span class="field-label">DETALLE</span>
      <textarea id="edit-detail" placeholder="Descripción, estado, notas..."></textarea>
    </label>
    <label>
      <span class="field-label">PRECIO ($)</span>
      <input id="edit-price" type="number" min="0" step="1" placeholder="0">
    </label>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveEdit()">Guardar</button>
      <button class="btn-cancel" onclick="closeEdit()">Cancelar</button>
    </div>
  </div>
</div>

<script>
  let allBooks = [];
  let adminMode = false;
  let adminPassword = '';
  let cart = [];

  document.querySelector('header h1').addEventListener('dblclick', () => {
    if (!adminMode) {
      const pw = prompt('Contrasena de administrador:');
      if (!pw) return;
      adminPassword = pw;
    }
    adminMode = !adminMode;
    document.getElementById('admin-bar').style.display = adminMode ? 'block' : 'none';
    renderBooks();
  });

  function toggleAdmin() {
    adminMode = false;
    document.getElementById('admin-bar').style.display = 'none';
    renderBooks();
  }

  async function loadBooks() {
    const res = await fetch('/api/books');
    allBooks = await res.json();
    renderBooks();
  }

  function renderBooks() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let books = allBooks;
    if (q) {
      books = books.filter(b =>
        b.title.toLowerCase().includes(q) ||
        (b.author && b.author.toLowerCase().includes(q))
      );
    }
    const available = books.filter(b => !b.sold);
    const sold = books.filter(b => b.sold);
    const sorted = [...available, ...sold];
    const count = allBooks.filter(b => !b.sold).length;
    document.getElementById('book-count').textContent =
      count === 0 ? 'Sin libros disponibles' :
      count === 1 ? '1 libro disponible' :
      `${count} libros disponibles`;
    const grid = document.getElementById('grid');
    if (sorted.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>${q ? 'No se encontraron libros con esa busqueda' : 'Todavia no hay libros cargados'}</p></div>`;
      return;
    }
    grid.innerHTML = sorted.map(book => `
      <div class="book-card ${book.sold ? 'sold' : ''}">
        ${book.photo
          ? `<img class="book-img" src="${book.photo}" alt="${escHtml(book.title)}" loading="lazy">`
          : `<div class="book-img-placeholder">📚</div>`}
        <div class="book-info">
          <div class="book-title">${escHtml(book.title)}</div>
          ${book.author ? `<div class="book-author">${escHtml(book.author)}</div>` : ''}
          ${book.detail ? `<div class="book-detail">${escHtml(book.detail)}</div>` : ''}
                    <div class="price-block">
            ${book.price != null
              ? `<span class="price-sale">${formatPrice(book.price)}</span>${book.originalPrice ? `<span class="price-original">${formatPrice(book.originalPrice)}</span><span class="discount-badge">-10%</span>` : ''}`
              : `<span style="color:#aaa;font-size:0.85rem;font-style:italic">Sin precio aún</span>`}
          </div>
          ${!book.sold && book.price != null ? `<button class="btn-cart ${cart.includes(book.id) ? 'in-cart' : ''}" onclick="toggleCart('${book.id}')">
            ${cart.includes(book.id) ? '✓ Seleccionado' : '🛒 Lo quiero'}
          </button>` : ''}
          <div class="admin-btns ${adminMode ? 'visible' : ''}">
            <button class="btn-edit" onclick="editBook('${book.id}')">✏️ Editar</button>
            <button class="btn-photo" onclick="changePhoto('${book.id}')">📷 Foto</button>
            <button class="btn-sold" onclick="markSold('${book.id}', ${!book.sold})">
              ${book.sold ? '↩ Disponible' : '✓ Vendido'}
            </button>
            <button class="btn-delete" onclick="deleteBook('${book.id}')">Eliminar</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleCart(id) {
    const idx = cart.indexOf(id);
    if (idx === -1) cart.push(id);
    else cart.splice(idx, 1);
    updateCartFloat();
    renderBooks();
  }

  function updateCartFloat() {
    const btn = document.getElementById('cart-float');
    const badge = document.getElementById('cart-badge');
    badge.textContent = cart.length;
    btn.style.display = cart.length > 0 ? 'flex' : 'none';
  }

  function openCart() {
    const items = cart.map(id => allBooks.find(b => b.id === id)).filter(Boolean);
    const total = items.reduce((s, b) => s + b.price, 0);
    document.getElementById('cart-items').innerHTML = items.map(b => `
      <div class="cart-item">
        <div>
          <div class="cart-item-title">${escHtml(b.title)}</div>
          ${b.author ? `<div class="cart-item-author">${escHtml(b.author)}</div>` : ''}
        </div>
        <div class="cart-item-price">${formatPrice(b.price)}</div>
        <button class="cart-item-remove" onclick="toggleCart('${b.id}'); openCart();">✕</button>
      </div>
    `).join('');
    document.getElementById('cart-total-price').textContent = formatPrice(total);
    document.getElementById('cart-modal').style.display = 'flex';
  }

  function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

  document.getElementById('cart-modal').addEventListener('click', function(e) {
    if (e.target === this) closeCart();
  });

  function buildMessage() {
    const items = cart.map(id => allBooks.find(b => b.id === id)).filter(Boolean);
    const total = items.reduce((s, b) => s + b.price, 0);
    const lines = items.map(b => `- ${b.title}${b.author ? ' (' + b.author + ')' : ''}: ${formatPrice(b.price)}`).join('\n');
    return `Hola! Me interesan estos libros:\n${lines}\n\nTotal: ${formatPrice(total)}`;
  }

  function sendWhatsApp() {
    window.open(`https://wa.me/56997423516?text=${encodeURIComponent(buildMessage())}`, '_blank');
  }

  function sendEmail() {
    window.open(`mailto:matis.lib@gmail.com?subject=${encodeURIComponent('Consulta por libros')}&body=${encodeURIComponent(buildMessage())}`, '_blank');
  }

  async function markSold(id, sold) {
    const res = await fetch(`/api/books/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ sold })
    });
    if (res.status === 403) { alert('Contrasena incorrecta'); return; }
    await loadBooks();
  }

  async function deleteBook(id) {
    if (!confirm('Eliminar este libro?')) return;
    const res = await fetch(`/api/books/${id}`, {
      method: 'DELETE',
      headers: { 'X-Admin-Password': adminPassword }
    });
    if (res.status === 403) { alert('Contrasena incorrecta'); return; }
    allBooks = allBooks.filter(b => b.id !== id);
    renderBooks();
  }

  const photoInput = document.createElement('input');
  photoInput.type = 'file';
  photoInput.accept = 'image/*';
  document.body.appendChild(photoInput);

  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, 900 / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function changePhoto(id) {
    photoInput.onchange = async () => {
      const file = photoInput.files[0];
      if (!file) return;
      const photo = await compressImage(file);
      const res = await fetch(`/api/books/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
        body: JSON.stringify({ photo })
      });
      if (res.status === 403) { alert('Contrasena incorrecta'); return; }
      await loadBooks();
      photoInput.value = '';
    };
    photoInput.click();
  }

  let editingId = null;

  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });

  function editBook(id) {
    const book = allBooks.find(b => b.id === id);
    if (!book) return;
    editingId = id;
    document.getElementById('edit-title').value = book.title || '';
    document.getElementById('edit-author').value = book.author || '';
    document.getElementById('edit-detail').value = book.detail || '';
    document.getElementById('edit-price').value = book.price != null ? book.price : '';
    document.getElementById('edit-modal').style.display = 'flex';
    document.getElementById('edit-title').focus();
  }

  function closeEdit() {
    document.getElementById('edit-modal').style.display = 'none';
    editingId = null;
  }

  async function saveEdit() {
    if (!editingId) return;
    const title = document.getElementById('edit-title').value.trim();
    const author = document.getElementById('edit-author').value.trim();
    const detail = document.getElementById('edit-detail').value.trim();
    const price = parseFloat(document.getElementById('edit-price').value);
    if (!title) { alert('El título no puede estar vacío'); return; }
    if (isNaN(price) || price < 0) { alert('Ingresa un precio válido'); return; }
    const res = await fetch(`/api/books/${editingId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPassword },
      body: JSON.stringify({ title, author, detail, price })
    });
    if (res.status === 403) { alert('Contraseña incorrecta'); return; }
    closeEdit();
    await loadBooks();
  }

  function formatPrice(p) {
    if (p == null) return '';
    return '$' + p.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadBooks();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
